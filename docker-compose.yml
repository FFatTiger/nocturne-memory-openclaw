services:
  postgres:
    image: ${NOCTURNE_POSTGRES_IMAGE:-pgvector/pgvector:pg16}
    container_name: ${NOCTURNE_POSTGRES_CONTAINER:-nocturne-postgres}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nocturne}
      POSTGRES_USER: ${POSTGRES_USER:-nocturne}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - nocturne_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nocturne} -d ${POSTGRES_DB:-nocturne}"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    image: ${NOCTURNE_FRONTEND_IMAGE:-fffattiger/nocturne-memory-frontend:ssr-20260326-1022-amd64}
    build:
      context: ./web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://nocturne:change-me@postgres:5432/nocturne}
      API_TOKEN: ${API_TOKEN:-}
      CORE_MEMORY_URIS: ${CORE_MEMORY_URIS:-core://agent,preferences://user,core://workflow}
      SNAPSHOT_DIR: /app/snapshots
    ports:
      - "${WEB_PORT:-18901}:18901"
    volumes:
      - nocturne_frontend_snapshots:/app/snapshots

volumes:
  nocturne_postgres_data:
  nocturne_frontend_snapshots:
