services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: nocturne
      POSTGRES_USER: nocturne
      POSTGRES_PASSWORD: LfEtVWtD5SSRKSgcu4pZxLlt
    ports:
      - "55439:5432"
    volumes:
      - /home/proxxy/apps/nocturne-memory/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nocturne -d nocturne"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    image: fffattiger/nocturne-memory-frontend:ssr-20260326-1418-fix1-amd64
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://nocturne:LfEtVWtD5SSRKSgcu4pZxLlt@postgres:5432/nocturne
      API_TOKEN: ""
      CORE_MEMORY_URIS: core://agent,preferences://user,core://workflow
      SNAPSHOT_DIR: /app/snapshots
    ports:
      - "18901:18901"
    volumes:
      - /home/proxxy/apps/nocturne-memory/data/web/snapshots:/app/snapshots
